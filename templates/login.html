<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宿舍填報系統 - 登入</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <h2 class="text-2xl font-bold text-center text-slate-800 mb-2">🏫 宿舍請假自動填報</h2>
        <p class="text-sm text-center text-slate-500 mb-6">歡迎使用，請選擇您的身分登入</p>
        
        {% if error %}
        <div class="bg-red-100 text-red-700 p-3 rounded-xl mb-4 text-center font-medium text-sm">⚠️ {{ error }}</div>
        {% endif %}

        <div class="flex bg-slate-100 p-1 rounded-xl mb-6">
            <button onclick="switchRole('student')" id="btn-student" class="w-1/2 py-2 text-center font-bold rounded-lg text-sm bg-white shadow text-blue-600">👤 學生登入</button>
            <button onclick="switchRole('teacher')" id="btn-teacher" class="w-1/2 py-2 text-center font-bold rounded-lg text-sm text-slate-600">👨‍🏫 老師管理</button>
        </div>

        <form method="POST" id="loginForm">
            <input type="hidden" name="role" id="role-input" value="student">
            
            <div id="student-fields" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">學生學號</label>
                    <input type="number" name="student_id" placeholder="請輸入6位數學號" class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">學生姓名</label>
                    <input type="text" name="student_name" placeholder="請輸入姓名" class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>

            <div id="teacher-fields" class="space-y-4 hidden">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">管理員登入密碼</label>
                    <input type="password" name="password" placeholder="請輸入密碼 (0800...)" class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl mt-6 shadow-lg transition duration-200">🚀 進入系統</button>
        </form>
    </div>

    <script>
        function switchRole(role) {
            document.getElementById('role-input').value = role;
            if(role === 'student') {
                document.getElementById('student-fields').classList.remove('hidden');
                document.getElementById('teacher-fields').classList.add('hidden');
                document.getElementById('btn-student').className = "w-1/2 py-2 text-center font-bold rounded-lg text-sm bg-white shadow text-blue-600";
                document.getElementById('btn-teacher').className = "w-1/2 py-2 text-center font-bold rounded-lg text-sm text-slate-600";
            } else {
                document.getElementById('student-fields').classList.add('hidden');
                document.getElementById('teacher-fields').className = "space-y-4";
                document.getElementById('btn-student').className = "w-1/2 py-2 text-center font-bold rounded-lg text-sm text-slate-600";
                document.getElementById('btn-teacher').className = "w-1/2 py-2 text-center font-bold rounded-lg text-sm bg-white shadow text-blue-600";
            }
        }
    </script>
</body>
</html>
